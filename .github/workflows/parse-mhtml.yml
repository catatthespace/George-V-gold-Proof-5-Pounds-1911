name: Parse MHTML and Generate CSV

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  parse-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run MHTML parser
        run: python parse_mhtml.py
      
      - name: Commit and push CSV results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f auction_results.csv ]; then
            git add auction_results.csv
            git commit -m "Update auction_results.csv - Auto-generated by GitHub Actions" || echo "No changes to commit"
            git push
          else
            echo "CSV file not found"
          fi
