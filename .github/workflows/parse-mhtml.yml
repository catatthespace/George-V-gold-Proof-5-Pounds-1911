name: Parse MHTML and Generate CSV

on:
  workflow_dispatch:

jobs:
  parse-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run MHTML parser
        run: python parse_mhtml.py
      
      - name: Commit and push CSV results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet auction_results.csv; then
            echo "No changes in CSV"
          else
            git add auction_results.csv
            git commit -m "Update auction_results.csv - Auto-generated by GitHub Actions"
            git push
          fi
